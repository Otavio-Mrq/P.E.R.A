<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <title>Meu Endereço - P.E.R.A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="d-flex">
        <aside class="sidebar d-flex flex-column">
            <div class="p-4 text-center border-bottom">
                <h3 class="text-success fw-bold mb-0">
                    <i class="bi bi-apple"></i> P.E.R.A
                </h3>
                <small class="text-muted" style="font-size: 0.7rem;">Gestão Agrícola</small>
            </div>
            <nav class="nav flex-column mt-3 flex-grow-1" id="menu-lateral">
                <a href="dashboard.html" class="nav-link nav-item-custom"><i class="bi bi-grid-1x2"></i> Dashboard</a>
                <a href="vitrine.html" class="nav-link nav-item-custom"><i class="bi bi-shop"></i> Vitrine</a>
                <a href="estoque.html" class="nav-link nav-item-custom"><i class="bi bi-box-seam"></i> Meu Estoque</a>
                <a href="novo-lote.html" class="nav-link nav-item-custom"><i class="bi bi-plus-circle"></i> Novo
                    Lote</a>
                <a href="retiradas.html" class="nav-link nav-item-custom"><i class="bi bi-check-circle"></i>
                    Retiradas</a>
                <a href="endereco.html" class="nav-link nav-item-custom"><i class="bi bi-geo-alt"></i> Meu Endereço</a>
            </nav>
            <div class="p-3 border-top mt-auto">
                <a href="login.html" class="btn btn-outline-danger w-100 text-start border-0">
                    <i class="bi bi-box-arrow-left me-2"></i> Sair do Sistema
                </a>
            </div>
        </aside>
        <main class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-0">Meu Endereço (ViaCEP)</h3>
                    <p class="text-muted">Gerencie a localização da sua propriedade</p>
                </div>
                <div>
                    <button class="btn btn-dark btn-sm rounded-circle p-2 shadow" id="btn-dark-mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                </div>
            </div>
            <div class="card p-4 custom-card">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label text-muted small">CEP</label>
                        <input type="text" id="cep-input" class="form-control" placeholder="00000-000">
                    </div>
                    <div class="col-md-8 mb-3">
                        <label class="form-label text-muted small">Logradouro</label>
                        <input type="text" id="rua-input" class="form-control" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Bairro</label>
                        <input type="text" id="bairro-input" class="form-control" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted small">Cidade / Estado</label>
                        <input type="text" id="cidade-input" class="form-control" readonly>
                    </div>
                </div>
                <button class="btn btn-success mt-2">Salvar Alterações</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
