<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta - P.E.R.A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-login">
    <div class="d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="card login-card p-4 p-md-5 shadow-sm border-0" style="max-width: 650px;">
            <div class="text-center mb-4">
                <div class="fs-1 mb-2">🍐</div>
                <h5 class="fw-bold text-dark mb-1">Criar Conta</h5>
                <small class="text-muted">Junte-se à rede de economia circular agrícola</small>
            </div>
            <form id="form-cadastro">
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size: 0.80rem;">Tipo de Usuário</label>
                    <div class="d-flex gap-3 flex-wrap">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipoUsuario" id="tipoProdutor" value="Produtor" checked>
                            <label class="form-check-label text-muted" style="font-size: 0.85rem;" for="tipoProdutor">Produtor Rural</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="tipoUsuario" id="tipoReceptor" value="Receptor">
                            <label class="form-check-label text-muted" style="font-size: 0.85rem;" for="tipoReceptor">Receptor (Indústria/Compostagem/Ração)</label>
                        </div>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="font-size: 0.80rem;">Nome Completo / Razão Social</label>
                        <input type="text" id="nome-cadastro" class="form-control bg-light border-0" placeholder="Nome completo" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="font-size: 0.80rem;">CPF / CNPJ</label>
                        <input type="text" class="form-control bg-light border-0" placeholder="000.000.000-00" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="font-size: 0.80rem;">Email</label>
                        <input type="email" id="email-cadastro" class="form-control bg-light border-0" placeholder="seu@email.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="font-size: 0.80rem;">Telefone</label>
                        <input type="text" class="form-control bg-light border-0" placeholder="(00) 00000-0000" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="font-size: 0.80rem;">Palavra-passe</label>
                        <div class="position-relative">
                            <input type="password" id="senha-cadastro" class="form-control bg-light border-0" placeholder="********" required>
                            <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted btn-mostrar-senha" style="cursor: pointer;"></i>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" style="font-size: 0.80rem;">Confirmar Palavra-passe</label>
                        <div class="position-relative">
                            <input type="password" id="confirma-senha-cadastro" class="form-control bg-light border-0" placeholder="********" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold rounded-3 mb-3 mt-2">Criar Conta</button>
                <div class="text-center">
                    <a href="index.html" class="text-success text-decoration-none" style="font-size: 0.85rem;">Já tem uma conta? Fazer login</a>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
