<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Login - P.E.R.A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-login">
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card p-5 shadow-sm border-0">
            <div class="text-center mb-4">
                <div class="fs-1 mb-2">🍐</div>
                <h5 class="fw-bold text-dark mb-1">P.E.R.A</h5>
                <small class="text-muted" style="font-size: 0.70rem;">Programa de Eficiência e Reaproveitamento Agrícola</small>
            </div>
            <form id="form-login">
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size: 0.80rem;">Email</label>
                    <input type="email" id="email-login" class="form-control form-control-lg bg-light border-0 fs-6" placeholder="seu@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" style="font-size: 0.80rem;">Palavra-passe</label>
                    <div class="position-relative">
                        <input type="password" id="senha-login" class="form-control form-control-lg bg-light border-0 fs-6" placeholder="********" required>
                        <i class="bi bi-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted btn-mostrar-senha" style="cursor: pointer;"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-semibold rounded-3 mb-3">Entrar</button>
                <div class="text-center">
                    <a href="cadastro.html" class="text-success text-decoration-none" style="font-size: 0.85rem;">Não tem uma conta? Registe-se</a>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
